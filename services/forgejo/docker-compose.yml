# Forgejo + Runner + PostgreSQL
#
# Setup:
#   1. Generate a shared secret:  openssl rand -hex 20
#   2. Replace CHANGEME_SHARED_SECRET below with the output
#   3. Replace CHANGEME_DB_PASSWORD with a secure database password
#   4. Replace CHANGEME_ROOT_PASSWORD with the Forgejo admin password
#   5. Run:  docker compose up -d
#
# The runner registers itself automatically via shared secret (no web UI token needed).

volumes:
  docker_certs:

services:

  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: forgejo
      POSTGRES_PASSWORD: CHANGEME_DB_PASSWORD
      POSTGRES_DB: forgejo
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  docker-in-docker:
    image: data.forgejo.org/oci/docker:dind
    hostname: docker
    privileged: true
    restart: always
    environment:
      DOCKER_TLS_CERTDIR: /certs
    volumes:
      - docker_certs:/certs

  server:
    image: data.forgejo.org/forgejo/forgejo:14.0.3
    restart: always
    depends_on:
      - db
    command: >-
      bash -c '
      /usr/bin/s6-svscan /etc/s6 &
      sleep 10 ;
      su -c "forgejo forgejo-cli actions register --keep-labels --secret CHANGEME_SHARED_SECRET" git ;
      su -c "forgejo admin user create --admin --username root --password CHANGEME_ROOT_PASSWORD --email admin@forgejo.home" git ;
      sleep infinity
      '
    environment:
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: db:5432
      FORGEJO__database__NAME: forgejo
      FORGEJO__database__USER: forgejo
      FORGEJO__database__PASSWD: CHANGEME_DB_PASSWORD
      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO__server__ROOT_URL: http://forgejo.home:3000
      FORGEJO__actions__ENABLED: "true"
      FORGEJO__repository__ENABLE_PUSH_CREATE_USER: "true"
      FORGEJO__repository__DEFAULT_PUSH_CREATE_PRIVATE: "false"
      FORGEJO__repository__DEFAULT_REPO_UNITS: "repo.code,repo.actions"
    volumes:
      - ./data/forgejo:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "2222:22"

  runner-register:
    image: data.forgejo.org/forgejo/runner:12.7.2
    restart: "no"
    depends_on:
      - server
      - docker-in-docker
    environment:
      DOCKER_HOST: tcp://docker-in-docker:2376
    volumes:
      - ./data/runner:/data
      - docker_certs:/certs:ro
    user: "0:0"
    command: >-
      bash -ec '
      while : ; do
        forgejo-runner create-runner-file --connect --instance http://server:3000 --name homelab-runner --secret CHANGEME_SHARED_SECRET && break ;
        sleep 1 ;
      done ;
      sed -i -e "s|\"labels\": \[\]|\"labels\": [\"docker:docker://data.forgejo.org/oci/node:24-bookworm\",\"ubuntu-latest:docker://catthehacker/ubuntu:act-24.04\",\"debian-latest:docker://debian:trixie-slim\"]|" .runner ;
      forgejo-runner generate-config > config.yml ;
      sed -i -e "s|network: .*|network: host|" config.yml ;
      sed -i -e "s|^  envs:$$|  envs:\n    DOCKER_HOST: tcp://docker:2376\n    DOCKER_TLS_VERIFY: 1\n    DOCKER_CERT_PATH: /certs/client|" config.yml ;
      sed -i -e "s|^  options:|  options: -v /certs/client:/certs/client|" config.yml ;
      sed -i -e "s|  valid_volumes: \[\]$$|  valid_volumes:\n    - /certs/client|" config.yml ;
      chown -R 1000:1000 /data
      '

  runner-daemon:
    image: data.forgejo.org/forgejo/runner:12.7.2
    restart: always
    depends_on:
      runner-register:
        condition: service_completed_successfully
      docker-in-docker:
        condition: service_started
    environment:
      DOCKER_HOST: tcp://docker:2376
      DOCKER_CERT_PATH: /certs/client
      DOCKER_TLS_VERIFY: "1"
    volumes:
      - ./data/runner:/data
      - docker_certs:/certs
    command: >-
      bash -c '
      while : ; do test -w .runner && forgejo-runner --config config.yml daemon ; sleep 1 ; done
      '
